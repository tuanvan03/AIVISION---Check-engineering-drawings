{% extends "base.html" %}
{% block title %}Đăng ký — AI Vision Drawing Checker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Đăng ký</h1>
        <p class="auth-subtitle">Tạo tài khoản mới để bắt đầu kiểm tra bản vẽ.</p>

        <div id="authError" class="auth-error hidden"></div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="display_name">Tên hiển thị</label>
                <input class="form-input" type="text" id="display_name" name="display_name" placeholder="Nguyễn Văn A" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Tối thiểu 8 ký tự" required minlength="8" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Xác nhận mật khẩu</label>
                <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required minlength="8" autocomplete="new-password">
            </div>

            <button type="submit" id="registerBtn" class="btn btn-primary btn-block btn-lg">
                <span id="registerBtnText">Đăng ký</span>
                <span id="registerBtnSpinner" class="spinner hidden"></span>
            </button>
        </form>

        <div class="auth-links">
            <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    const form = document.getElementById('registerForm');
    const btn = document.getElementById('registerBtn');
    const btnText = document.getElementById('registerBtnText');
    const btnSpinner = document.getElementById('registerBtnSpinner');
    const errEl = document.getElementById('authError');

    function setLoading(loading) {
        btn.disabled = loading;
        btnText.classList.toggle('hidden', loading);
        btnSpinner.classList.toggle('hidden', !loading);
    }

    function showError(msg) {
        errEl.textContent = msg || 'Đăng ký thất bại. Vui lòng thử lại.';
        errEl.classList.remove('hidden');
    }

    function hideError() {
        errEl.classList.add('hidden');
    }

    function markFieldError(el, msg) {
        el.classList.add('input-error');
        if (typeof showFieldError === 'function') {
            showFieldError(el, msg);
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        if (typeof clearFieldErrors === 'function') {
            clearFieldErrors(form);
        }
        form.querySelectorAll('.form-input').forEach(el => el.classList.remove('input-error'));

        const displayName = document.getElementById('display_name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        let valid = true;
        if (!displayName) {
            markFieldError(document.getElementById('display_name'), 'Vui lòng nhập tên hiển thị');
            valid = false;
        }
        if (!email) {
            markFieldError(document.getElementById('email'), 'Vui lòng nhập email');
            valid = false;
        } else if (typeof validateEmail === 'function' && !validateEmail(email)) {
            markFieldError(document.getElementById('email'), 'Email không đúng định dạng');
            valid = false;
        }
        if (!password) {
            markFieldError(document.getElementById('password'), 'Vui lòng nhập mật khẩu');
            valid = false;
        } else if (password.length < 8) {
            markFieldError(document.getElementById('password'), 'Mật khẩu tối thiểu 8 ký tự');
            valid = false;
        }
        if (!confirmPassword) {
            markFieldError(document.getElementById('confirm_password'), 'Vui lòng xác nhận mật khẩu');
            valid = false;
        } else if (password !== confirmPassword) {
            markFieldError(document.getElementById('confirm_password'), 'Mật khẩu xác nhận không khớp');
            valid = false;
        }
        if (!valid) return;

        setLoading(true);
        try {
            await api.post('/api/v1/auth/register', {
                email,
                password,
                confirm_password: confirmPassword,
                display_name: displayName
            });
            window.location.href = '/login?registered=1';
        } catch (err) {
            showError(err && err.message);
        } finally {
            setLoading(false);
        }
    });
})();
</script>
{% endblock %}
